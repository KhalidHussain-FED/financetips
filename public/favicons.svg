<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Black Circle Background -->
  <circle cx="50" cy="50" r="48" fill="#000000"/>
  
  <!-- Yellow Ring Border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#FFD300" stroke-width="2.5"/>
  
  <!-- FLT Text in Yellow -->
  <text x="50" y="42" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFD300" text-anchor="middle" letter-spacing="3">FLT</text>
  
  <!-- Yellow Decorative Line -->
  <line x1="28" y1="52" x2="72" y2="52" stroke="#FFD300" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Subtitle in White -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">FINANCE</text>
</svg>